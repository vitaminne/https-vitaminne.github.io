<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! - Animasi Pertama vitaminne</title>
    
    <style>
        /* --- 1. PENGATURAN DASAR (BACGKROUND) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            /* Warna latar belakang pink lembut yang ceria */
            background-color: #ffeef2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah scrollbar muncul saat animasi */
        }

        /* --- 2. CONTAINER UTAMA ANIMASI --- */
        .stage {
            position: relative;
            width: 80%;
            max-width: 500px;
            height: 500px;
            text-align: center;
        }

        /* --- 3. TEKS HAPPY BIRTHDAY --- */
        .wishing-text {
            color: #ff4081; /* Warna pink gelap */
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            position: relative;
            z-index: 10; /* Biar di depan gambar */
            
            /* Panggil animasi "Teks Muncul" */
            animation: textFadeIn 1.5s ease-out forwards;
        }

        /* --- 4. GAMBAR ANAK PEREMPUAN --- */
        .girl-image {
            max-height: 350px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%); /* Biar tepat di tengah */
            
            /* Panggil animasi "Masuk dari Samping" */
            animation: girlEntry 2s ease-out forwards;
        }

        /* --- 5. GAMBAR KUE ULANG TAHUN --- */
        .cake-image {
            max-height: 100px;
            position: absolute;
            bottom: 80px; /* Atur ketinggian agar pas di tangan anak perempuan */
            left: 50%;
            transform: translateX(-50%) scale(0); /* Mulai dari kecil/hilang */
            
            /* Panggil animasi "Kue Muncul & Goyang" */
            /* Kita kasih delay (jeda) 2s agar muncul setelah anak perempuan */
            animation: cakePopInYoyo 1s ease-out 2s forwards, cakeSway 1.5s infinite 3s;
        }


        /* ========================================= */
        /* --- KUNCI ANIMASI (CSS KEYFRAMES) --- */
        /* ========================================= */

        /* A. Animasi Teks Muncul (Fade In) */
        @keyframes textFadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* B. Animasi Anak Perempuan Masuk dari Samping */
        @keyframes girlEntry {
            from { opacity: 0; left: -100px; } /* Mulai dari luar layar kiri */
            to { opacity: 1; left: 50%; } /* Berhenti di tengah */
        }

        /* C. Animasi Kue Muncul dari Kecil ke Besar (Pop In) */
        @keyframes cakePopInYoyo {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            80% { transform: translateX(-50%) scale(1.1); opacity: 1; } /* Melebih sedikit */
            100% { transform: translateX(-50%) scale(1); opacity: 1; } /* Kembali normal */
        }

        /* D. Animasi Kue Goyang Pelan (Yoyo/Sway) untuk kesan 'hidup' */
        @keyframes cakeSway {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(5deg); }
        }

    </style>
</head>
<body>

    <div class="stage">
        
        <h1 class="wishing-text">Selamat Ulang Tahun! 🎉</h1>

        <img src="https://via.placeholder.com/300x350?text=Birthday+Girl" alt="Anak Perempuan Senyum" class="girl-image">

        <img src="https://via.placeholder.com/100x100?text=Cake" alt="Kue Ulang Tahun" class="cake-image">

    </div>

</body>
</html>
